<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IRD-GenDB{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('about') }}">
      <i class="bi bi-eye-fill me-2"></i>IRD-GenDB
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
             href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link {{ 'active' if request.path == '/about' else '' }}"
             href="{{ url_for('about') }}">
            About
          </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'patients' %}active{% endif %}"
             href="{{ url_for('patients') }}">
            <i class="bi bi-people me-1"></i>Patients
          </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'variants' %}active{% endif %}"
             href="{{ url_for('variants') }}">
            Variants
          </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'search' %}active{% endif %}"
             href="{{ url_for('search') }}">
            <i class="bi bi-search me-1"></i>Search
          </a>
        </li>
      </ul>
      
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'help' %}active{% endif %}"
             href="{{ url_for('help') }}">
            <i class="bi bi-question-circle me-1"></i>Help
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
